services:
  stockanalyzer:
    build:
      context: .
      dockerfile: Containerfile
    image: stockanalyzer-gitops:local
    container_name: stockanalyzer
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request, sys; sys.exit(0) if urllib.request.urlopen('http://127.0.0.1:8000/docs').status == 200 else sys.exit(1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
